<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statzm AI</title>
    <style>
        :root {
            --primary: #ffffff;
            --accent: #00d4ff;
            --bg: #000000; /* Pure Black Background */
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- THE LOGO (TOP RIGHT) --- */
        .statzm-logo {
            position: absolute;
            top: 30px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }
        .statzm-logo img {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 5px var(--accent));
        }
        .statzm-logo span {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            color: white;
        }

        /* --- WHITE AURA ANIMATION --- */
        .aura {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: 1;
            filter: blur(40px);
            animation: moveAura 15s infinite alternate ease-in-out;
        }

        @keyframes moveAura {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(10%, 10%); }
        }

        /* --- CHAT BOX --- */
        #statzm-chat {
            position: relative;
            z-index: 10;
            width: 450px;
            height: 650px;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(25px); /* Professional blur */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .chat-header {
            padding: 25px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-header h2 { margin: 0; font-size: 18px; color: var(--accent); }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 14px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-bubble {
            align-self: flex-end;
            background: white;
            color: black;
            font-weight: 500;
        }

        .ai-bubble {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-container {
            padding: 20px;
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            font-size: 15px;
            outline: none;
        }

        button {
            background: transparent;
            color: var(--accent);
            border: none;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="aura"></div>

    <div class="statzm-logo">
        <img src="https://via.placeholder.com/40/00d4ff/ffffff?text=S" alt="Logo"> <span>statzm.ai</span>
    </div>

    <div id="statzm-chat">
        <div class="chat-header">
            <h2>Statzm Core</h2>
        </div>
        
        <div id="messages">
            <div class="bubble ai-bubble">Systems online. How can Statzm AI assist your learning today?</div>
        </div>

        <div class="input-container">
            <input type="text" id="userInput" placeholder="Message Statzm AI..." onkeypress="handleKey(event)">
            <button onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <script>
        function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const messages = document.getElementById('messages');
            if (!input.value.trim()) return;

            // User Message
            const userText = input.value;
            messages.innerHTML += `<div class="bubble user-bubble">${userText}</div>`;
            input.value = '';
            messages.scrollTop = messages.scrollHeight;

            // API Call to your Node.js server
            try {
                const res = await fetch('http://localhost:3000/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: userText })
                });
                const data = await res.json();
                messages.innerHTML += `<div class="bubble ai-bubble">${data.reply}</div>`;
            } catch (err) {
                messages.innerHTML += `<div class="bubble ai-bubble" style="color: #ff4444;">Connection to Statzm Core lost.</div>`;
            }
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
